version: '3.8'

services:
  # ── MySQL Database ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ul-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ultralearning
      MYSQL_USER: ultralearning
      MYSQL_PASSWORD: ultralearning123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python AI Service ───────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ul-ai-service
    env_file:
      - ./ai-service/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Spring Boot Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ul-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ultralearning?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ultralearning
      SPRING_DATASOURCE_PASSWORD: ultralearning123
      AI_SERVICE_BASE_URL: http://ai-service:8000

  # ── Vue.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ul-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
